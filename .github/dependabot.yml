version: 2
updates:
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "monthly"
    labels:
      - "npm"
      - "dependencies"
    ignore:
      - dependency-name: "@types/node"
        versions:
          - "25.x"
          - "26.x"
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "monthly"
